services:

  app:
    build: .
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=ep-quiet-moon-a1qjrh8u.ap-southeast-1.aws.neon.tech
      - DB_PORT=5432
      - DB_DATABASE=neondb
      - DB_USERNAME=neondb_owner
      - DB_PASSWORD=npg_9FTvfAhJ2EHO
      - DB_SSLMODE=require
    volumes:
      - .:/var/www/html
      - .env:/var/www/.env
      - ./storage:/var/www/storage
    # depends_on:
    #   db:
    #     condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: order_management
    ports:
      - "3306:3306"
    # volumes:
    #   - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

volumes:
  db_data:
